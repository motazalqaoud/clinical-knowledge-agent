name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set — skipping sync. See deploy/README.md."
            exit 0
          fi
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          cp deploy/space_README.md README.md
          git add README.md
          git commit -m "Sync from GitHub with Space front matter" || echo "No changes to commit"
          git push "https://motazalqaoud:${HF_TOKEN}@huggingface.co/spaces/motazalqaoud/clinical-knowledge-agent" HEAD:main --force
